<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Presentación Master Plan Ceamse 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;700&family=Roboto:wght@900&display=swap" rel="stylesheet">
    <style>
        :root {
            --azul-profundo: #1C3E5C;
            --celeste-ceamse: #74ACD2;
        }
        body {
            background-color: var(--azul-profundo);
            font-family: 'Open Sans', sans-serif;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }
        .ceamse-black {
            font-family: 'Arial Black', 'Helvetica Black', 'Roboto', sans-serif;
            font-weight: 900;
            letter-spacing: -0.05em;
        }
        .btn-enter {
            background-color: var(--celeste-ceamse);
            transition: all 0.3s ease;
        }
        .btn-enter:hover {
            transform: scale(1.05);
            filter: brightness(1.1);
            box-shadow: 0 0 20px rgba(116, 172, 210, 0.4);
        }
        .logo-container {
            animation: fadeInDown 1s ease-out;
        }
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="text-center px-4 max-w-4xl">
        <div class="logo-container mb-12">
            <img src="logoC.png" alt="CEAMSE" class="mx-auto h-32 md:h-48 drop-shadow-2xl">
        </div>
        
        <h1 class="ceamse-black text-white text-3xl md:text-5xl lg:text-6xl uppercase leading-tight mb-8">
            Tableros de Presentación<br>
            <span class="text-[#74ACD2]">Master Plan Ceamse 2026</span><br>
            <span class="text-2xl md:text-3xl opacity-80">- Gestión Tapia -</span>
        </h1>

        <div class="flex flex-col items-center gap-6">
            <a href="master_planI.html" class="btn-enter px-12 py-5 rounded-full text-[#1C3E5C] font-black text-xl uppercase tracking-widest shadow-xl">
                Ingresar al Tablero
            </a>
            <p class="text-white/40 text-xs font-bold uppercase tracking-[0.4em]">Confidencial - Uso Interno</p>
        </div>
    </div>

</body>
</html>
